name: Deploy Frontend Only

# frontend/index.html 만 변경됐을 때 빠르게 gh-pages에 반영 (스캔 재실행 없이)
# 메인 scan.yml은 cron + workflow_dispatch만 돌고, push에 트리거 안 됨.
# 이 워크플로우는 push 시 frontend 변경만 감지해서 1분 안에 배포.

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: smart-money-frontend-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Checkout gh-pages (보존용)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-current

      - name: Build payload (frontend 새로, 데이터 보존)
        run: |
          mkdir -p _site
          # gh-pages의 모든 데이터 파일 보존
          [ -f gh-pages-current/results.json ] && cp gh-pages-current/results.json _site/
          [ -f gh-pages-current/tracking.json ] && cp gh-pages-current/tracking.json _site/
          [ -f gh-pages-current/earnings.json ] && cp gh-pages-current/earnings.json _site/
          [ -f gh-pages-current/last_update.json ] && cp gh-pages-current/last_update.json _site/
          [ -d gh-pages-current/archives ] && cp -r gh-pages-current/archives _site/
          # frontend는 main의 최신 버전으로
          cp frontend/index.html _site/index.html
          ls -la _site/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          keep_files: false  # 위에서 다 챙겼으니 깔끔하게 교체
          force_orphan: false
          commit_message: "frontend deploy: ${{ github.event.head_commit.message }}"
