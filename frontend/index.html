<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Smart Money Screener — 수급 매매 스크리너</title>
<style>
  :root {
    --bg: #0b1220; --card: #111a2c; --border: #1f2a44;
    --text: #e6edf7; --muted: #6b7a99; --accent: #38bdf8;
    --short: #fbbf24; --tenbagger: #a78bfa; --gold: #facc15;
    --watch: #34d399;
    --safe: #22c55e; --warn: #f59e0b; --danger: #ef4444;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
      "Pretendard", "Segoe UI", "Noto Sans KR", sans-serif;
    background: var(--bg); color: var(--text); padding: 12px;
    line-height: 1.5;
  }
  header {
    display: flex; justify-content: space-between; align-items: baseline;
    flex-wrap: wrap; gap: 8px; margin-bottom: 12px;
  }
  h1 { font-size: 18px; margin: 0; color: var(--accent); }
  .meta { color: var(--muted); font-size: 12px; }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  button {
    background: var(--card); color: var(--text); border: 1px solid var(--border);
    padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 14px;
    font-weight: 500;
  }
  button:hover { border-color: var(--accent); }
  button:disabled { opacity: 0.5; cursor: wait; }
  button.active { background: var(--accent); color: #0b1220; border-color: var(--accent); }
  .tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .tab {
    background: var(--card); color: var(--muted); border: 1px solid var(--border);
    padding: 6px 12px; border-radius: 999px; cursor: pointer; font-size: 13px;
    user-select: none; white-space: nowrap;
  }
  .tab.active { background: var(--accent); color: #0b1220; border-color: var(--accent); }
  .tab .cnt {
    margin-left: 4px; font-weight: 700; font-size: 12px;
    opacity: 0.85;
  }
  .tab.active .cnt { opacity: 1; }
  .grid {
    display: grid; gap: 8px;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px;
  }
  .card-head {
    display: flex; justify-content: space-between; align-items: baseline;
    gap: 8px; margin-bottom: 6px;
  }
  .name a { color: var(--text); text-decoration: none; font-weight: 600; font-size: 15px; }
  .name a:hover { color: var(--accent); }
  .ticker { color: var(--muted); font-size: 11px; margin-left: 6px; }
  .labels { display: flex; gap: 4px; flex-wrap: wrap; }
  .label {
    font-size: 11px; padding: 2px 6px; border-radius: 4px; font-weight: 600;
    background: rgba(255,255,255,0.05); border: 1px solid var(--border);
  }
  .label-short { color: var(--short); border-color: var(--short); }
  .label-tenbagger { color: var(--tenbagger); border-color: var(--tenbagger); }
  .label-gold { color: var(--gold); border-color: var(--gold);
    background: rgba(250,204,21,0.1); }
  .label-watch { color: var(--watch); border-color: var(--watch); }
  .badges {
    display: flex; gap: 6px; flex-wrap: wrap; margin: 4px 0;
    font-size: 11px;
  }
  .badge {
    padding: 2px 7px; border-radius: 4px; border: 1px solid var(--border);
  }
  .pos-good   { color: var(--safe);  border-color: var(--safe); }
  .pos-alert  { color: var(--gold);  border-color: var(--gold); }
  .pos-warn   { color: var(--warn);  border-color: var(--warn); }
  .pos-watch  { color: var(--watch); border-color: var(--watch); }
  .pos-danger { color: var(--danger);border-color: var(--danger); }
  .pos-muted  { color: var(--muted); border-color: var(--border); }
  .risk-safe    { color: var(--safe);  border-color: var(--safe); }
  .risk-watch   { color: var(--watch); border-color: var(--watch); }
  .risk-warning { color: var(--warn);  border-color: var(--warn); }
  .risk-danger  { color: var(--danger);border-color: var(--danger); }
  .row {
    display: flex; gap: 12px; flex-wrap: wrap; font-size: 12px; color: var(--muted);
    margin-top: 4px;
  }
  .row span { white-space: nowrap; }
  .row b { color: var(--text); font-weight: 600; }
  .reasons {
    margin-top: 6px; font-size: 11px; color: var(--muted);
    display: flex; gap: 4px; flex-wrap: wrap;
  }
  .reasons .r {
    padding: 1px 5px; background: rgba(56,189,248,0.08); border-radius: 3px;
    color: var(--accent);
  }
  .actions { display: flex; gap: 6px; margin-top: 8px; }
  .actions button {
    flex: 1; padding: 6px 8px; font-size: 12px;
  }
  .empty { text-align: center; color: var(--muted); padding: 40px; }
  .err { color: #f87171; }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: flex; align-items: flex-start; justify-content: center;
    padding: 20px 12px; overflow-y: auto; z-index: 100;
  }
  .modal {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    width: min(900px, 100%); padding: 16px;
  }
  .modal-head {
    display: flex; justify-content: space-between; align-items: baseline;
    border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 12px;
    gap: 12px; flex-wrap: wrap;
  }
  .modal-head h2 { margin: 0; font-size: 17px; }
  .modal-head h2 a { color: var(--text); text-decoration: none; }
  .modal-head h2 a:hover { color: var(--accent); }
  .close-btn {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    padding: 4px 10px; border-radius: 4px; font-size: 13px;
  }
  .section {
    margin-bottom: 14px;
  }
  .section h3 {
    font-size: 13px; color: var(--accent); margin: 0 0 8px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .score-bars { display: grid; gap: 6px; }
  .score-bar {
    display: grid; grid-template-columns: 90px 1fr 50px; gap: 8px; align-items: center;
    font-size: 12px;
  }
  .score-bar .bar {
    background: rgba(255,255,255,0.06); border-radius: 4px; height: 14px;
    overflow: hidden;
  }
  .score-bar .fill {
    background: linear-gradient(90deg, var(--accent), #6366f1);
    height: 100%;
  }
  .masters-grid {
    display: grid; gap: 10px;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  }
  .master {
    background: rgba(255,255,255,0.03); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px;
  }
  .master-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 6px;
  }
  .master-name { font-size: 13px; font-weight: 600; }
  .master-pct { font-size: 16px; font-weight: 700; color: var(--accent); }
  .master-sub { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .master-items { display: grid; gap: 3px; font-size: 11px; }
  .master-items .item.ok { color: var(--text); }
  .master-items .item.no { color: var(--muted); }
  .master-items .item .check { display: inline-block; width: 14px; }
  .risks ul { margin: 0; padding-left: 18px; font-size: 12px; }
  .risks li { color: var(--warn); }
  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    h1 { font-size: 16px; }
    .modal { padding: 12px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>💰 Smart Money Screener</h1>
    <div class="meta" id="meta">로딩 중…</div>
    <div class="meta" id="schedule" style="margin-top:2px"></div>
  </div>
  <div class="controls">
    <button id="refresh-btn" onclick="refresh()">새로고침</button>
    <button id="rerun-btn" onclick="rerun()">재분석</button>
  </div>
</header>

<div class="tabs" id="tabs">
  <span class="tab active" data-filter="labeled">전체 <b class="cnt" data-cnt="labeled">0</b></span>
  <span class="tab" data-filter="⭐황금자리">⭐ 황금자리 <b class="cnt" data-cnt="⭐황금자리">0</b></span>
  <span class="tab" data-filter="⚡단타">⚡ 단타 <b class="cnt" data-cnt="⚡단타">0</b></span>
  <span class="tab" data-filter="💎텐버거">💎 텐버거 <b class="cnt" data-cnt="💎텐버거">0</b></span>
  <span class="tab" data-filter="🔍매집중">🔍 매집중 <b class="cnt" data-cnt="🔍매집중">0</b></span>
  <span class="tab" data-filter="unlabeled">📋 관찰 <b class="cnt" data-cnt="unlabeled">0</b></span>
</div>

<div id="content"><div class="empty">로딩 중…</div></div>
<div id="modal-root"></div>

<script>
let DATA = null;
let CURRENT_FILTER = "labeled";
const POS_CLASS = {
  good: "pos-good", alert: "pos-alert", warn: "pos-warn",
  watch: "pos-watch", danger: "pos-danger", muted: "pos-muted",
};

async function refresh() {
  document.getElementById("content").innerHTML = '<div class="empty">불러오는 중…</div>';
  try {
    const res = await fetch("/api/results", { cache: "no-store" });
    DATA = await res.json();
    render();
  } catch (e) {
    document.getElementById("content").innerHTML =
      `<div class="empty err">로드 실패: ${e.message}</div>`;
  }
}

async function rerun() {
  const btn = document.getElementById("rerun-btn");
  btn.disabled = true; btn.textContent = "재분석 중…";
  try {
    await fetch("/api/refresh", { method: "POST" });
    setTimeout(() => { btn.disabled = false; btn.textContent = "재분석"; refresh(); }, 5000);
  } catch (e) {
    btn.disabled = false; btn.textContent = "재분석";
  }
}

function fmtMcap(m) {
  if (!m) return "—";
  if (m >= 1e12) return (m / 1e12).toFixed(1) + "조";
  if (m >= 1e8)  return Math.round(m / 1e8) + "억";
  return m.toLocaleString();
}

function labelClass(l) {
  if (l === "⭐황금자리") return "label-gold";
  if (l === "⚡단타") return "label-short";
  if (l === "💎텐버거") return "label-tenbagger";
  if (l === "🔍매집중") return "label-watch";
  return "";
}

function cardHtml(r) {
  const reasons = [
    ...(r.short_term?.reasons || []),
    ...(r.tenbagger?.reasons || []),
  ];
  const uniqReasons = [...new Set(reasons)].slice(0, 5);
  const posCls = POS_CLASS[r.position?.color] || "pos-muted";
  return `
  <div class="card">
    <div class="card-head">
      <div class="name">
        <a href="${r.naver_url}" target="_blank" rel="noopener">${r.name}</a>
        <span class="ticker">${r.ticker}</span>
      </div>
      <div class="labels">
        ${r.labels.map(l =>
          `<span class="label ${labelClass(l)}">${l}</span>`).join("")}
      </div>
    </div>
    <div class="badges">
      <span class="badge ${posCls}">📍 ${r.position?.label ?? "—"}</span>
      <span class="badge risk-${r.risk?.severity ?? "safe"}">⚠ ${r.risk?.severity ?? "safe"}${r.risk?.signals?.length ? ` (${r.risk.signals.length})` : ""}</span>
    </div>
    <div class="row">
      <span>점수 <b>${r.score.total}</b></span>
      <span>매집 <b>${r.accumulation.duration}일</b></span>
      <span>시총 <b>${fmtMcap(r.marcap)}</b></span>
      <span>RVOL <b>${r.metrics.rvol ?? "—"}</b></span>
    </div>
    ${uniqReasons.length ? `
      <div class="reasons">
        ${uniqReasons.map(x => `<span class="r">${x}</span>`).join("")}
      </div>` : ""}
    <div class="actions">
      <button onclick='openDetail(${JSON.stringify(r.ticker)})'>📊 상세</button>
      <button onclick='window.open(${JSON.stringify(r.naver_url)}, "_blank")'>🔗 네이버</button>
    </div>
  </div>`;
}

// ── 스케줄 (KST 평일 16:00, 21:00) ───────────────────
function nextScheduledRun(nowMs) {
  // KST 기준 시각 계산 (UTC+9)
  const now = new Date(nowMs);
  const kstOffsetMs = 9 * 60 * 60 * 1000;
  const userOffsetMs = -now.getTimezoneOffset() * 60 * 1000;
  // KST의 "지금" Date 객체 만들기
  const kstNow = new Date(now.getTime() + (kstOffsetMs - userOffsetMs));
  const slots = [16, 21];  // 평일 KST 시각

  for (let i = 0; i < 8; i++) {
    const day = new Date(kstNow);
    day.setDate(day.getDate() + i);
    const dow = day.getDay();  // 0=일, 6=토
    if (dow === 0 || dow === 6) continue;
    for (const h of slots) {
      const slot = new Date(day);
      slot.setHours(h, 0, 0, 0);
      if (slot > kstNow) {
        // 사용자 로컬 시각으로 환원
        return new Date(slot.getTime() - (kstOffsetMs - userOffsetMs));
      }
    }
  }
  return null;
}

function fmtCountdown(ms) {
  if (ms < 0) return "예정 시각 경과";
  const total = Math.floor(ms / 1000);
  const d = Math.floor(total / 86400);
  const h = Math.floor((total % 86400) / 3600);
  const m = Math.floor((total % 3600) / 60);
  const s = total % 60;
  if (d > 0) return `${d}일 ${h}시간 ${m}분`;
  if (h > 0) return `${h}시간 ${m}분 ${s}초`;
  if (m > 0) return `${m}분 ${s}초`;
  return `${s}초`;
}

function updateSchedule() {
  const sched = document.getElementById("schedule");
  if (!sched) return;
  const next = nextScheduledRun(Date.now());
  if (!next) { sched.textContent = ""; return; }
  const nextStr = next.toLocaleString("ko-KR", {
    month: "numeric", day: "numeric",
    hour: "2-digit", minute: "2-digit",
    weekday: "short",
  });
  const remain = next.getTime() - Date.now();
  sched.textContent = `⏰ 다음 자동 스캔 ${nextStr} · 남은 시간 ${fmtCountdown(remain)}`;
}

function render() {
  if (!DATA) return;
  const meta = document.getElementById("meta");
  if (DATA.generated_at) {
    const dt = new Date(DATA.generated_at).toLocaleString("ko-KR", {
      month: "numeric", day: "numeric",
      hour: "2-digit", minute: "2-digit", second: "2-digit",
    });
    const u = DATA.universe_size ?? "?";
    const s1 = DATA.stage1_passed ?? "?";
    const total = (DATA.results || []).length;
    const labeledN = (DATA.results || []).filter(r => (r.labels || []).length > 0).length;
    meta.textContent = `🕐 마지막 스캔 ${dt} · 유니버스 ${u} → S1 ${s1} → 분석 ${total} → 라벨 ${labeledN}`;
  } else {
    meta.textContent = DATA.message || "—";
  }
  updateSchedule();
  // 라벨별 카운트
  const all = DATA.results || [];
  const labeled = all.filter(r => (r.labels || []).length > 0);
  const unlabeled = all.filter(r => (r.labels || []).length === 0);
  const counts = {
    labeled: labeled.length,
    unlabeled: unlabeled.length,
    "⭐황금자리": 0, "⚡단타": 0, "💎텐버거": 0, "🔍매집중": 0,
  };
  all.forEach(r => (r.labels || []).forEach(l => {
    if (counts[l] != null) counts[l] += 1;
  }));
  document.querySelectorAll(".tab .cnt").forEach(el => {
    const k = el.dataset.cnt;
    el.textContent = counts[k] ?? 0;
  });

  let items;
  if (CURRENT_FILTER === "labeled") items = labeled;
  else if (CURRENT_FILTER === "unlabeled") items = unlabeled;
  else items = all.filter(r => (r.labels || []).includes(CURRENT_FILTER));
  const root = document.getElementById("content");
  if (items.length === 0) {
    root.innerHTML = '<div class="empty">조건 통과 종목 없음</div>';
    return;
  }
  root.innerHTML = `<div class="grid">${items.map(cardHtml).join("")}</div>`;
}

// ── Detail Modal ─────────────────────────────────────

function masterCardHtml(m) {
  const items = (m.items || [])
    .map(it => `<div class="item ${it.ok ? "ok" : "no"}">
      <span class="check">${it.ok ? "✅" : "▫️"}</span>${it.label}</div>`)
    .join("");
  const sub = m.phase || m.stage || m.type || "";
  return `
    <div class="master">
      <div class="master-head">
        <div class="master-name">${m.name}</div>
        <div class="master-pct">${m.percent ?? "—"}%</div>
      </div>
      ${sub ? `<div class="master-sub">${sub}</div>` : ""}
      <div class="master-items">${items}</div>
    </div>`;
}

function scoreBar(label, val, max) {
  const pct = Math.min(100, (val / max) * 100);
  return `
    <div class="score-bar">
      <span>${label}</span>
      <div class="bar"><div class="fill" style="width:${pct}%"></div></div>
      <span><b>${val}</b>/${max}</span>
    </div>`;
}

function openDetail(ticker) {
  const r = (DATA.results || []).find(x => x.ticker === ticker);
  if (!r) return;
  const m = r.masters || {};
  const masterOrder = ["wyckoff", "oneil", "minervini", "weinstein", "livermore"];
  const masterCards = masterOrder
    .filter(k => m[k]).map(k => masterCardHtml(m[k])).join("");

  const risks = (r.risk?.signals || []);
  const riskHtml = risks.length
    ? `<ul>${risks.map(s => `<li>${s}</li>`).join("")}</ul>`
    : `<div style="color:var(--safe)">신호 없음</div>`;

  const reasons = [
    ...(r.short_term?.reasons || []),
    ...(r.tenbagger?.reasons || []),
  ];
  const fails = [
    ...(r.short_term?.fail || []),
    ...(r.tenbagger?.fail || []),
  ];

  document.getElementById("modal-root").innerHTML = `
    <div class="modal-bg" onclick="if(event.target===this) closeDetail()">
      <div class="modal">
        <div class="modal-head">
          <h2><a href="${r.naver_url}" target="_blank">${r.name} <span class="ticker">${r.ticker}</span></a>
            ${r.labels.map(l => `<span class="label ${labelClass(l)}" style="margin-left:6px">${l}</span>`).join("")}
          </h2>
          <button class="close-btn" onclick="closeDetail()">닫기</button>
        </div>

        <div class="section">
          <h3>핵심 지표</h3>
          <div class="row" style="font-size:13px">
            <span>위치 <b>${r.position?.label ?? "—"}</b> <span style="color:var(--muted)">— ${r.position?.desc ?? ""}</span></span>
            <span>리스크 <b style="color:var(--${r.risk?.severity === "danger" ? "danger" : r.risk?.severity === "warning" ? "warn" : r.risk?.severity === "watch" ? "watch" : "safe"})">${r.risk?.severity ?? "safe"}</b></span>
            <span>시총 <b>${fmtMcap(r.marcap)}</b></span>
            <span>매집 <b>${r.accumulation.duration}일</b></span>
            <span>박스 <b>${r.accumulation.range_pct}%</b></span>
            <span>RVOL <b>${r.metrics.rvol}</b></span>
            <span>52주H <b>${r.metrics.is_52w_high ? "✓" : "—"}</b></span>
            <span>S1 <b>${r.stage1_score ?? "—"}</b></span>
          </div>
        </div>

        <div class="section">
          <h3>수급 점수 (총 ${r.score.total} / 100)</h3>
          <div class="score-bars">
            ${scoreBar("일치도", r.score.confluence, 30)}
            ${scoreBar("강도", r.score.intensity, 25)}
            ${scoreBar("지속성", r.score.persistence, 25)}
            ${scoreBar("보조", r.score.aux, 20)}
          </div>
        </div>

        <div class="section">
          <h3>대가별 진단</h3>
          <div class="masters-grid">${masterCards}</div>
        </div>

        ${reasons.length ? `
        <div class="section">
          <h3>출발 신호 통과 사유</h3>
          <div class="reasons">${[...new Set(reasons)].map(x => `<span class="r">${x}</span>`).join("")}</div>
        </div>` : ""}

        ${fails.length ? `
        <div class="section">
          <h3>출발 신호 미충족</h3>
          <div class="reasons" style="opacity:0.7">${[...new Set(fails)].map(x => `<span class="r" style="background:rgba(239,68,68,0.08);color:var(--danger)">${x}</span>`).join("")}</div>
        </div>` : ""}

        <div class="section risks">
          <h3>리스크 신호</h3>
          ${riskHtml}
        </div>

        <div class="actions">
          <button onclick='window.open(${JSON.stringify(r.naver_url)}, "_blank")'>🔗 네이버에서 차트 보기</button>
        </div>
      </div>
    </div>`;
  document.body.style.overflow = "hidden";
}

function closeDetail() {
  document.getElementById("modal-root").innerHTML = "";
  document.body.style.overflow = "";
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeDetail();
});

document.querySelectorAll(".tab").forEach(t => {
  t.onclick = () => {
    document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
    t.classList.add("active");
    CURRENT_FILTER = t.dataset.filter;
    render();
  };
});

refresh();
setInterval(updateSchedule, 1000);
updateSchedule();
</script>
